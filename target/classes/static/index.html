<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimGraph 2</title>
  <link rel="stylesheet" href="css/style.css"/>
  <!-- Cytoscape.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <h1>SimGraph 2</h1>

    <section class="panel">
      <h2>Graph</h2>
      <label class="row">
        <span>Type</span>
        <select id="graphType">
          <option value="undirected">Undirected</option>
          <option value="directed">Directed</option>
        </select>
      </label>
      <label class="row">
        <span>Mode</span>
        <select id="editMode">
          <option value="select">Select / Move</option>
          <option value="addVertex">Add Vertex</option>
          <option value="addEdge">Add Edge</option>
          <option value="delete">Delete</option>
        </select>
      </label>
      <div class="btn-row">
        <button id="btnClear" class="btn-danger">Clear</button>
        <button id="btnLayout">Auto Layout</button>
        <button id="btnExample">Load Example</button>
      </div>
    </section>

    <section class="panel">
      <h2>Algorithm</h2>
      <select id="algorithmSelect">
        <optgroup label="Traversal">
          <option value="bfs">BFS — Breadth-First Search</option>
          <option value="dfs">DFS — Depth-First Search</option>
        </optgroup>
        <optgroup label="Shortest Path">
          <option value="dijkstra">Dijkstra</option>
          <option value="bellman_ford">Bellman-Ford</option>
          <option value="floyd_warshall">Floyd-Warshall</option>
        </optgroup>
        <optgroup label="Spanning Tree">
          <option value="kruskal">Kruskal (MST)</option>
          <option value="prim">Prim (MST)</option>
        </optgroup>
        <optgroup label="Connectivity">
          <option value="kosaraju">Kosaraju (SCC)</option>
          <option value="topological_sort">Topological Sort</option>
          <option value="cut_vertices">Cut Vertices &amp; Bridges</option>
          <option value="blocks">Biconnected Components</option>
        </optgroup>
        <optgroup label="Other">
          <option value="hierholzer">Hierholzer (Euler Path)</option>
          <option value="edge_classification">Edge Classification</option>
          <option value="transitive_closure">Transitive Closure</option>
        </optgroup>
      </select>

      <label class="row" id="sourceRow">
        <span>Source vertex</span>
        <input type="number" id="sourceVertex" value="0" min="0"/>
      </label>

      <button id="btnRun" class="btn-primary">▶ Run</button>
    </section>

    <section class="panel" id="legendPanel">
      <h2>Legend</h2>
      <div class="legend-item"><span class="dot white"></span> Unvisited</div>
      <div class="legend-item"><span class="dot gray"></span> Discovered / In queue</div>
      <div class="legend-item"><span class="dot red"></span> Currently processing</div>
      <div class="legend-item"><span class="dot orange"></span> Updated / Relaxed</div>
      <div class="legend-item"><span class="dot black"></span> Finished</div>
      <div class="legend-item"><span class="dot green"></span> In result</div>
    </section>
  </aside>

  <!-- Main canvas -->
  <main id="main">
    <div id="cy"></div>

    <!-- Matrix overlay for Floyd-Warshall / Transitive Closure -->
    <div id="matrixOverlay" class="hidden">
      <div id="matrixContainer">
        <h3 id="matrixTitle">Distance Matrix</h3>
        <div id="matrixTable"></div>
      </div>
    </div>

    <!-- Data structure panel (binomial heap, binary heap, etc.) -->
    <div id="dsPanel" class="hidden">
      <div id="dsPanelHeader">
        <div>
          <span id="dsPanelTitle">Data structure</span>
          <span id="dsPanelHint"></span>
        </div>
        <div id="dsPanelControls">
          <button id="btnDsSmaller" title="Make smaller">−</button>
          <button id="btnDsLarger" title="Make larger">+</button>
          <button id="btnDsClose" title="Close">✕</button>
        </div>
      </div>
      <div id="dsScrollArea">
        <svg id="dataStructSvg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>
  </main>

  <!-- Playback bar -->
  <footer id="playbar">
    <div id="stepInfo">
      <span id="stepCounter">—</span>
      <span id="stepDesc">Run an algorithm to begin</span>
    </div>
    <div id="controls">
      <button id="btnFirst" title="First step">⏮</button>
      <button id="btnPrev"  title="Previous">◀◀</button>
      <button id="btnPlay"  title="Play/Pause">▶</button>
      <button id="btnNext"  title="Next">▶▶</button>
      <button id="btnLast"  title="Last step">⏭</button>
      <label>Speed
        <input type="range" id="speedSlider" min="100" max="2000" value="800" step="100"/>
      </label>
    </div>
  </footer>
</div>

<script src="js/app.js"></script>
</body>
</html>
